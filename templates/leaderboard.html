<!DOCTYPE html>
<html>

<head>

    <title>Leaderboard - HireAI</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f4f4;
            padding:40px;
        }

        .container{
            max-width:700px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:15px;
        }

        h1{
            text-align:center;
            color:#2d5be3;
        }

        .player{
            background:#f1f1f1;
            padding:15px;
            margin-top:10px;
            border-radius:10px;
            display:flex;
            justify-content:space-between;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Leaderboard 🏆</h1>

    <div id="leaderboard"></div>

</div>

<script>

const leaderboard =
JSON.parse(localStorage.getItem("leaderboard")) || [];

leaderboard.sort((a,b) => b.score - a.score);

let html = "";

leaderboard.forEach(player => {

    html += `

        <div class="player">

            <span>${player.name}</span>

            <span>${player.score}</span>

        </div>

    `;
});

document.getElementById("leaderboard").innerHTML = html;

</script>

</body>

</html>
