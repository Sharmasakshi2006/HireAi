<!DOCTYPE html>
<html>
<head>
    <title>AI Interview</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:#f2f2f2;
        }

        .box{
            width:500px;
            margin:60px auto;
            background:white;
            padding:40px;
            border-radius:10px;
            text-align:center;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        input{
            width:90%;
            padding:12px;
            margin-top:20px;
            font-size:16px;
        }

        button{
            width:95%;
            padding:12px;
            margin-top:20px;
            background:#2952e3;
            color:white;
            border:none;
            border-radius:5px;
            font-size:18px;
            cursor:pointer;
        }

        #questions{
            text-align:left;
            margin-top:30px;
        }

        li{
            margin-bottom:10px;
        }

    </style>

</head>

<body>

    <div class="box">

        <h1>AI Interview Questions</h1>

        <input type="text" id="role" placeholder="Enter Job Role">

        <button onclick="generateQuestions()">
            Generate Questions
        </button>

        <div id="questions"></div>

    </div>

    <script>

        function generateQuestions(){

            let role = document.getElementById("role").value;

            let questionsDiv = document.getElementById("questions");

            if(role == ""){
                alert("Please enter role");
                return;
            }

            let questions = [];

            if(role.toLowerCase().includes("python")){

                questions = [
                    "What is Python?",
                    "Explain Django framework.",
                    "Difference between list and tuple?",
                    "What is API?",
                    "Explain OOP concepts."
                ];

            }

            else if(role.toLowerCase().includes("java")){

                questions = [
                    "What is JVM?",
                    "Explain inheritance.",
                    "What is Spring Boot?",
                    "Difference between JDK and JRE?",
                    "Explain polymorphism."
                ];

            }

            else{

                questions = [
                    "Tell me about yourself.",
                    "Why should we hire you?",
                    "What are your strengths?",
                    "Explain your projects.",
                    "Where do you see yourself in 5 years?"
                ];

            }

            let html = "<h2>Questions:</h2><ul>";

            questions.forEach(function(q){
                html += `<li>${q}</li>`;
            });

            html += "</ul>";

            questionsDiv.innerHTML = html;

        }

    </script>

</body>
</html>
