<!DOCTYPE html>
<html>

<head>

    <title>AI Resume Analyzer</title>

    <style>

        body{
            margin:0;
            font-family:Arial;
            background:#f4f4f4;
        }

        .container{
            width:700px;
            margin:50px auto;
            background:white;
            padding:40px;
            border-radius:12px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
            color:#2952e3;
        }

        textarea{
            width:100%;
            height:250px;
            padding:15px;
            margin-top:20px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:14px;
            margin-top:20px;
            border:none;
            background:#2952e3;
            color:white;
            font-size:18px;
            border-radius:8px;
            cursor:pointer;
        }

        .result{
            margin-top:30px;
            background:#f1f1f1;
            padding:20px;
            border-radius:10px;
        }

        .score{
            font-size:28px;
            color:green;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>AI Resume Analyzer 🚀</h1>

    <textarea id="resumeText"
    placeholder="Paste your resume content here..."></textarea>

    <button onclick="analyzeResume()">
        Analyze Resume
    </button>

    <div class="result" id="result"></div>

</div>

<script>

function analyzeResume(){

    let text =
    document.getElementById("resumeText").value.toLowerCase();

    let score = 0;

    let suggestions = [];

    // Skill checks

    if(text.includes("python")){
        score += 20;
    }else{
        suggestions.push("Add Python skill");
    }

    if(text.includes("django")){
        score += 20;
    }else{
        suggestions.push("Add Django projects");
    }

    if(text.includes("javascript")){
        score += 20;
    }else{
        suggestions.push("Add JavaScript skill");
    }

    if(text.includes("html")){
        score += 20;
    }else{
        suggestions.push("Add HTML/CSS skills");
    }

    if(text.includes("project")){
        score += 20;
    }else{
        suggestions.push("Mention your projects");
    }

    let resultHTML = `

        <h2>ATS Resume Score</h2>

        <div class="score">
            ${score}/100
        </div>

        <h3>Suggestions:</h3>

        <ul>
    `;

    suggestions.forEach(function(s){

        resultHTML += `<li>${s}</li>`;

    });

    resultHTML += "</ul>";

    document.getElementById("result").innerHTML =
    resultHTML;
}

</script>

</body>

</html>
